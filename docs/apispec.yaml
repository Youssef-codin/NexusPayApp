servers:
  - url: http://localhost:3000
    description: Base Server
  - url: http://localhost:3000
    description: Development server
  - url: api.nexuspay.com
    description: Production server
components:
  schemas:
    login_user:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: youssef@gmail.com
        password: passwrd
    register_a_new_user:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        full_name:
          type: string
      example:
        email: john@gmail.com
        password: password
        full_name: John Doe
    create_transfer:
      type: object
      properties:
        to_wallet_id:
          type: string
        amount_in_piastres:
          type: integer
        note:
          type: string
      example:
        to_wallet_id: 123e4567-e89b-12d3-a456-426614174002
        amount_in_piastres: 5000
        note: Dinner split
    top_up_wallet:
      type: object
      properties:
        amount_in_piastres:
          type: integer
      example:
        amount_in_piastres: 5000
    stripe_webhook:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        data:
          type: object
          properties:
            object:
              type: object
              properties:
                id:
                  type: string
                amount:
                  type: integer
                currency:
                  type: string
                status:
                  type: string
      example:
        id: evt_test_webhook
        type: payment_intent.succeeded
        data:
          object:
            id: pi_test123
            amount: 5000
            currency: usd
            status: succeeded
  requestBodies:
    login_user:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/login_user"
      description: ""
      required: true
    register_a_new_user:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/register_a_new_user"
      description: ""
      required: true
    create_transfer:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/create_transfer"
      description: ""
      required: true
    top_up_wallet:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/top_up_wallet"
      description: ""
      required: true
    stripe_webhook:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/stripe_webhook"
      description: ""
      required: true
  securitySchemes:
    logout_user:
      type: http
      scheme: bearer
    test_authentication:
      type: http
      scheme: bearer
    create_transfer:
      type: http
      scheme: bearer
    get_transfers:
      type: http
      scheme: bearer
    get_transfer_by_id:
      type: http
      scheme: bearer
    get_scheduled_transfers:
      type: http
      scheme: bearer
    cancel_scheduled_transfer:
      type: http
      scheme: bearer
    search_users:
      type: http
      scheme: bearer
    get_payments:
      type: http
      scheme: bearer
    get_wallet:
      type: http
      scheme: bearer
    top_up_wallet:
      type: http
      scheme: bearer
