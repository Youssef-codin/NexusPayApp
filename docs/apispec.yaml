      summary: Get transfer by ID
      operationId: >-
        home_joe-arch_projects_go_nexus_docs_bruno_nexuspay_collections_nexusapii_transfers_get_transfer_by_id_yml
      description: ""
      tags:
        - Transfers
      responses:
