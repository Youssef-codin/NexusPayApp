          content:
            application/json:
              schema:
                type: object
                properties:
                  transfer:
                    type: object
                    properties:
                      id:
                        type: string
                      from_wallet_id:
                        type: string
                      from_user:
                        type: object
                        properties:
                          id:
                            type: string
                          full_name:
                            type: string
                      to_wallet_id:
                        type: string
                      to_user:
                        type: object
                        properties:
                          id:
                            type: string
                          full_name:
                            type: string
                      amount_in_piastres:
                        type: integer
                      direction:
                        type: string
                      status:
                        type: string
                      note:
                        type: string
                      created_at:
                        type: string
