                message: invalid id
                status_code: 400
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status_code:
                    type: integer
              example:
                error: unauthorized
                message: Missing or invalid authorization token
