  /transfers/scheduled/:
    get:
      summary: Get scheduled transfers
      operationId: >-
        home_joe-arch_projects_go_nexus_docs_bruno_nexuspay_collections_nexusapii_transfers_scheduled_get_scheduled_transfers_yml
      description: ""
      tags:
        - Transfers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduled_transfers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        transfer_id:
                          type: string
                        scheduled_at:
                          type: string
                        executed_at:
                          type: string
                          nullable: true
                        deleted_at:
                          type: string
                          nullable: true
                        created_at:
                          type: string
              examples:
                200_Response:
                  value:
                    scheduled_transfers:
                      - id: 123e4567-e89b-12d3-a456-426614174001
                        transfer_id: 123e4567-e89b-12d3-a456-426614174002
                        scheduled_at: "2024-01-20T10:00:00Z"
                        executed_at: null
                        deleted_at: null
                        created_at: "2024-01-15T10:30:00Z"
                  summary: 200 Response
                  description: Scheduled transfers retrieved successfully
                example:
                  value:
                    scheduled_transfers:
                      - id: 123e4567-e89b-12d3-a456-426614174001
                        transfer_id: 223e4567-e89b-12d3-a456-426614174002
                        scheduled_at: "2024-01-20T10:00:00Z"
                        executed_at: null
                        deleted_at: null
                        created_at: "2024-01-15T10:30:00Z"
                  summary: example
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status_code:
                    type: integer
              example:
                error: unauthorized
                message: Missing or invalid authorization token
                status_code: 401
      security:
        - get_scheduled_transfers: []
  /transfers/scheduled/:id:
    delete:
      summary: Cancel scheduled transfer
      operationId: >-
        home_joe-arch_projects_go_nexus_docs_bruno_nexuspay_collections_nexusapii_transfers_scheduled_cancel_scheduled_transfer_yml
      description: ""
      tags:
        - Transfers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled_id:
                    type: string
              examples:
                200_Response:
                  value:
                    cancelled_id: 123e4567-e89b-12d3-a456-426614174001
                  summary: 200 Response
                  description: Scheduled transfer cancelled successfully
                example:
                  value:
                    cancelled_id: 123e4567-e89b-12d3-a456-426614174001
                  summary: example
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status_code:
                    type: integer
              examples:
                400_Response:
                  value:
                    error: Bad request
                    message: invalid id
                    status_code: 400
                  summary: 400 Response
                  description: Bad request - invalid UUID
                400_Response_2:
                  value:
                    error: Bad request
