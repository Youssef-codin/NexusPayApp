                        direction: credit
                        status: completed
                        note: Lunch split
                        created_at: "2024-01-16T14:20:00Z"
                  summary: 200 Response
                  description: Transfers retrieved successfully
                example:
                  value:
                    transfers:
                      - id: 123e4567-e89b-12d3-a456-426614174001
                        from_wallet_id: 023e4567-e89b-12d3-a456-426614174000
                        from_user:
                          id: 023e4567-e89b-12d3-a456-426614174000
                          full_name: Alice Smith
                        to_wallet_id: 223e4567-e89b-12d3-a456-426614174002
                        to_user:
                          id: 323e4567-e89b-12d3-a456-426614174003
                          full_name: John Doe
                        amount_in_piastres: 5000
                        direction: debit
                        status: completed
                        note: Dinner split
                        created_at: "2024-01-15T10:30:00Z"
                      - id: 423e4567-e89b-12d3-a456-426614174004
                        from_wallet_id: 123e4567-e89b-12d3-a456-426614174000
                        from_user:
                          id: 123e4567-e89b-12d3-a456-426614174000
                          full_name: Alice Smith
                        to_wallet_id: 523e4567-e89b-12d3-a456-426614174005
                        to_user:
                          id: 623e4567-e89b-12d3-a456-426614174006
                          full_name: Jane Smith
