                properties:
                  error:
                    type: string
                  message:
                    type: string
                  status_code:
                    type: integer
              example:
                error: unauthorized
                message: Missing or invalid authorization token
                status_code: 401
      security:
        - get_transfers: []
  /transfers/:id:
